<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProReminder | Official Agent Tool</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=80&id=UpnwZDa50fGv&format=png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        .app-container {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .input-field {
            font-size: 14px;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            width: 100%;
            transition: all 0.15s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .label-text {
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 4px;
            display: block;
        }

        /* Clean Buttons without background colors */
        .btn-action {
            border: 1px solid #d1d5db;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            color: #374151;
            transition: all 0.2s ease;
            background: transparent;
        }

        .btn-action:hover {
            background: #f9fafb;
            border-color: #2563eb;
            color: #2563eb;
        }

        .btn-primary-action {
            border: 1px solid #2563eb;
            color: #2563eb;
        }

        .msg-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            background: #ffffff;
            position: relative;
        }

        .msg-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.08);
            border-color: #2563eb;
        }

        /* Specific Underline for title text only */
        .title-underline-container {
            margin-bottom: 16px;
        }

        .title-text {
            display: inline-block;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 2px; /* Just below the text */
            line-height: 1.2;
        }

        .step-number {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #1f2937;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            z-index: 10;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        #notification-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .show-notify { opacity: 1 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="app-container rounded-2xl overflow-hidden">
            <div class="p-6 border-b flex items-center justify-between bg-white">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-100">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-900 leading-tight">Customer Reminders</h1>
                        <p class="text-xs text-gray-500 font-medium">Post Office Agent Utility</p>
                    </div>
                </div>
            </div>

            <div class="p-6 space-y-6">
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <label class="label-text">Agent Signature / Post Office</label>
                    <input type="text" id="agent-name-input" onkeyup="updateAgentName()" 
                           value="फालेन्द्र साहू, पोस्ट ऑफिस एजेंट, हथबंद"
                           class="input-field font-medium" placeholder="Enter your name and office">
                </div>

                <div class="relative">
                    <input type="text" id="search-input" onkeyup="filterMessages()" 
                           placeholder="Search by title..." 
                           class="input-field pl-10 h-12">
                    <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                </div>

                <div id="messages-container" class="grid sm:grid-cols-2 gap-6 pt-2">
                </div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-header" class="mb-4">
                <h3 id="modal-title" class="text-lg font-bold text-gray-900">Customize Message</h3>
                <p id="modal-desc" class="text-xs text-gray-500 mt-1">Fill the details to generate reminder.</p>
            </div>
            
            <div id="modal-body" class="space-y-4 mb-6 text-left"></div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 btn-action">Cancel</button>
                <button id="modal-copy-btn" class="flex-1 btn-action btn-primary-action">Copy</button>
                <button id="modal-share-btn" class="flex-1 btn-action" style="background:#1f2937; color:white; border:none;">Share</button>
            </div>
        </div>
    </div>

    <div id="notification-bar">Message Copied!</div>

    <script>
        let agentName = "फालेन्द्र साहू, पोस्ट ऑफिस एजेंट, हथबंद";
        
        const messages = [
            { id: 1, title: "New RD Account Started", text: "प्रिय ग्राहक,\nआपका RD खाता पोस्ट ऑफिस हथबंद में सफलतापूर्वक सक्रिय हो गया है।\nपासबुक की फोटो सूचना हेतु भेजी जा रही है।\nमूल पासबुक मेरे पास सुरक्षित रखी गई है, ताकि हर माह की एंट्री समय पर की जा सके और निकासी या मैच्योरिटी के समय आपको दी जाएगी।\nधन्यवाद।\n{agent_signature}" },
            { id: 2, title: "Monthly Deposit Reminder", text: "प्रिय ग्राहक,\nआपके RD खाते की मासिक किस्त इस माह देय है।\nकृपया समय पर राशि जमा करें ताकि खाता नियमित बना रहे और ब्याज का लाभ मिलता रहे।\nधन्यवाद।\n{agent_signature}" },
            { id: 3, title: "Payment Received Confirmation", template: true, fields: ['received_amount'], text: "प्रिय ग्राहक,\nहमें आपके द्वारा ₹{received_amount} की राशि प्राप्त हो गई है।\nजल्द ही आपको पोस्ट ऑफिस की ओर से पुष्टि संदेश (SMS) प्राप्त होगा।\n{agent_signature}" },
            { id: 4, title: "Payment Credit Notice", template: true, fields: ['account_suffix', 'deposit_amount', 'deposit_date', 'current_balance'], text: "प्रिय ग्राहक,\nआपके RD खाता संख्या XXXXXX{account_suffix} में ₹{deposit_amount} की राशि {deposit_date} को जमा की गई है।\nआपका वर्तमान बैलेंस ₹{current_balance} है।\nधनराशि आपके खाते में सफलतापूर्वक जमा कर दी गई है।\n{agent_signature}" },
            { id: 5, title: "Missed Installment Alert", template: true, fields: ['missed_months'], text: "प्रिय ग्राहक,\nआपके RD खाते में पिछले {missed_months} माह से राशि जमा नहीं हुआ है।\nकृपया बकाया राशि के साथ फाइन (Fine) भी जल्द जमा करें,\nअन्यथा खाता बंद हो सकता है।\nसभी बकाया राशि जमा करने पर खाता पुनः सक्रिय हो जाएगा।\nधन्यवाद।\n{agent_signature}" },
            { id: 6, title: "Inactive Account Warning", text: "प्रिय ग्राहक,\nआपके खाते में लंबे समय से कोई राशि जमा नहीं हुआ है।\nपोस्ट ऑफिस नियमों के अनुसार लगातार 6 माह तक राशि जमा न होने पर खाता बंद हो जायेगा।\nकृपया बकाया राशि जमा कर खाता चालू रखें।\nधन्यवाद।\n{agent_signature}" },
            { id: 7, title: "Maturity Notice", template: true, fields: ['account_suffix'], text: "प्रिय ग्राहक,\nआपका RD खाता संख्या XXXXXX{account_suffix} परिपक्व (mature) हो गया है।\nकृपया अपनी पासबुक मुझसे प्राप्त करें और पोस्ट ऑफिस से राशि प्राप्त करें।\n\nआप चाहें तो हमसे नया RD खाता भी खुलवा सकते हैं।\nधन्यवाद।\n{agent_signature}" }
        ];

        window.onload = () => {
            agentName = document.getElementById("agent-name-input").value.trim();
            renderMessages();
        };

        function updateAgentName() { agentName = document.getElementById("agent-name-input").value.trim() || "Post Office Agent"; }
        function getSignedContent(text) { return text.replace("{agent_signature}", `– ${agentName}`); }

        function showNotification(msg) { 
            const bar = document.getElementById("notification-bar"); 
            bar.textContent = msg; 
            bar.classList.add("show-notify"); 
            setTimeout(() => bar.classList.remove("show-notify"), 2000); 
        }

        function copyText(t) { 
            navigator.clipboard.writeText(t).then(() => showNotification("Message Copied!")); 
            closeModal();
        }

        async function shareText(t) { 
            if (navigator.share) {
                await navigator.share({ text: t }); 
            } else {
                showNotification("Share not supported!");
            }
            closeModal();
        }

        function filterMessages() {
            const filter = document.getElementById("search-input").value.toLowerCase();
            renderMessages(messages.filter(m => m.title.toLowerCase().includes(filter)));
        }

        function renderMessages(data = messages) {
            const container = document.getElementById("messages-container");
            container.innerHTML = data.map((msg, index) => `
                <div class="msg-card">
                    <div class="step-number">${index + 1}</div>
                    <div class="title-underline-container">
                        <div class="title-text">
                            <h3 class="text-[14px] font-bold text-gray-900 pr-2">${msg.title}</h3>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${msg.template 
                            ? `<button onclick="openCustomModal(${msg.id})" class="btn-action btn-primary-action flex-1">Customize</button>`
                            : `<button onclick="copyText(getSignedContent('${msg.text.replace(/\n/g, '\\n')}'))" class="btn-action flex-1">Copy</button>
                               <button onclick="shareText(getSignedContent('${msg.text.replace(/\n/g, '\\n')}'))" class="btn-action flex-1">Share</button>`
                        }
                    </div>
                </div>
            `).join("");
        }

        function openCustomModal(id) {
            const msg = messages.find(m => m.id === id);
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = msg.title;
            body.innerHTML = '';

            msg.fields.forEach(field => {
                const label = field.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
                let inputHtml = `<input type="${field === 'deposit_date' ? 'date' : 'text'}" id="field-${field}" 
                                 class="input-field" placeholder="Enter ${label}" 
                                 ${field === 'deposit_date' ? `value="${new Date().toISOString().split('T')[0]}"` : ''}
                                 ${field.includes('amount') || field.includes('balance') ? 'oninput="formatCurrency(this)"' : ''}>`;
                
                body.innerHTML += `<div><label class="label-text">${label}</label>${inputHtml}</div>`;
            });

            document.getElementById('modal-copy-btn').onclick = () => processAction(id, 'copy');
            document.getElementById('modal-share-btn').onclick = () => processAction(id, 'share');
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function processAction(id, type) {
            const msg = messages.find(m => m.id === id);
            let finalTxt = msg.text;
            let isValid = true;

            msg.fields.forEach(field => {
                let val = document.getElementById(`field-${field}`).value;
                if(!val) isValid = false;
                if(field === 'deposit_date') val = val.split("-").reverse().join("-");
                finalTxt = finalTxt.replace(`{${field}}`, val);
            });

            if(!isValid) return showNotification("Please fill all fields!");
            const signedTxt = getSignedContent(finalTxt);
            type === 'copy' ? copyText(signedTxt) : shareText(signedTxt);
        }

        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

        function formatCurrency(input) {
            let val = input.value.replace(/,/g, "").replace(/\D/g, "");
            if (!val) return input.value = "";
            input.value = Number(val).toLocaleString("en-IN");
        }
    </script>
</body>
</html>
